<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MintOS v1.2 - Desktop Experience</title>
    
    <!-- Fontes e Estilos -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Bibliotecas Core -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            margin: 0; padding: 0;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background-color: #020617;
            user-select: none;
            -webkit-user-select: none;
            transition: background-color 0.7s ease;
        }

        /* Otimização para Modo Computador no Mobile */
        @media (max-width: 768px) {
            .desktop-scale {
                transform: scale(0.65);
                transform-origin: top left;
                width: 153.8%;
                height: 153.8%;
            }
        }

        .dark-theme { background-color: #020617; }
        .light-theme { background-color: #f1f5f9; }

        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dark-theme .glass {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        
        input[type="range"] {
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            height: 4px;
            border-radius: 2px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 12px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- Componente de Ícone ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    const icon = lucide.icons[name.toLowerCase().replace(/ /g, '-')];
                    if (icon) {
                        lucide.createIcons({
                            icons: { [name]: icon },
                            attrs: { strokeWidth: 2, width: size, height: size }
                        });
                    }
                }
            }, [name, size]);
            return <i ref={iconRef} data-lucide={name} className={className}></i>;
        };

        // --- Logo MintOS ---
        const MintLogo = ({ size = 100, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 100 100" className={className}>
                <path d="M 75 22 A 40 40 0 1 0 75 78" stroke="white" strokeWidth="12" strokeLinecap="round" fill="none" />
                <rect x="25" y="44" width="45" height="12" rx="6" fill="white" />
            </svg>
        );

        // --- Aplicativos ---
        const CalculatorApp = () => {
            const [display, setDisplay] = useState('0');
            const [equation, setEquation] = useState('');
            const handleNumber = (n) => setDisplay(p => p === '0' ? n : p + n);
            const calculate = () => { try { setDisplay(String(eval(equation + display))); setEquation(''); } catch { setDisplay('Erro'); } };
            return (
                <div className="h-full p-6 flex flex-col gap-4 bg-black/20">
                    <div className="bg-black/40 p-6 rounded-3xl text-right">
                        <p className="text-white/30 text-sm h-6">{equation}</p>
                        <p className="text-white text-4xl font-light truncate">{display}</p>
                    </div>
                    <div className="grid grid-cols-4 gap-2 flex-grow">
                        {['7','8','9','/','4','5','6','*','1','2','3','-','C','0','=','+'].map(b => (
                            <button key={b} onClick={() => b === 'C' ? setDisplay('0') : b === '=' ? calculate() : isNaN(b) ? (setEquation(display + b), setDisplay('0')) : handleNumber(b)} className="bg-white/10 hover:bg-white/20 rounded-2xl text-white text-xl transition-all">{b}</button>
                        ))}
                    </div>
                </div>
            );
        };

        const MusicApp = () => (
            <div className="h-full bg-gradient-to-b from-pink-500/20 to-purple-900/40 p-8 flex flex-col items-center justify-center gap-8">
                <div className="w-48 h-48 rounded-[40px] bg-white/10 shadow-2xl flex items-center justify-center border border-white/20"><Icon name="music" size={80} className="text-white/20" /></div>
                <div className="text-center text-white"><h3 className="text-2xl font-bold">Mint Melodies</h3><p className="opacity-50">Artista Desconhecido</p></div>
                <div className="flex items-center gap-8 text-white">
                    <Icon name="skip-back" size={24} /><div className="w-16 h-16 rounded-full bg-white text-purple-900 flex items-center justify-center shadow-xl"><Icon name="play" size={32} /></div><Icon name="skip-forward" size={24} />
                </div>
            </div>
        );

        const GalleryApp = () => (
            <div className="p-6 grid grid-cols-2 gap-4 bg-black/20 h-full overflow-auto">
                {[1,2,3,4,5,6].map(i => <div key={i} className="aspect-square rounded-3xl overflow-hidden border border-white/10 shadow-lg"><img src={`https://picsum.photos/seed/mint${i}/400/400`} className="w-full h-full object-cover" /></div>)}
            </div>
        );

        const FilesApp = () => (
            <div className="flex h-full text-white bg-black/20">
                <div className="w-32 border-r border-white/10 p-4 space-y-4"><p className="text-[10px] font-bold opacity-30 uppercase tracking-widest">Favoritos</p><div className="space-y-2 text-xs opacity-60"><div className="flex items-center gap-2 text-emerald-400 opacity-100"><Icon name="home" size={14} /> Início</div><div className="flex items-center gap-2"><Icon name="folder" size={14} /> Downloads</div></div></div>
                <div className="flex-grow p-8 grid grid-cols-3 gap-8">
                    {['Documentos', 'Imagens', 'Música'].map(f => (
                        <div key={f} className="flex flex-col items-center gap-2 group cursor-pointer">
                            <div className="w-20 h-20 bg-blue-500/20 rounded-3xl flex items-center justify-center text-blue-400 group-hover:bg-blue-500/30 transition-all"><Icon name="folder" size={40} /></div>
                            <span className="text-xs font-medium opacity-80">{f}</span>
                        </div>
                    ))}
                </div>
            </div>
        );

        const SettingsApp = ({ isDarkMode, setIsDarkMode, setWallpaper }) => (
            <div className="flex h-full text-white bg-black/20">
                <div className="w-40 border-r border-white/10 p-4 space-y-2">
                    {['Geral', 'Aparência', 'Sobre'].map(t => <button key={t} className={`w-full text-left p-2 rounded-xl text-sm ${t === 'Aparência' ? 'bg-white/10' : 'opacity-40'}`}>{t}</button>)}
                </div>
                <div className="flex-grow p-8 space-y-8 overflow-auto">
                    <h3 className="text-xl font-bold">Personalização</h3>
                    <div className="space-y-4">
                        <div className="p-4 bg-white/5 rounded-3xl border border-white/5 flex justify-between items-center">
                            <span>Modo Escuro</span>
                            <button onClick={() => setIsDarkMode(!isDarkMode)} className={`w-12 h-6 rounded-full relative transition-all ${isDarkMode ? 'bg-emerald-500' : 'bg-white/10'}`}><div className={`w-4 h-4 bg-white rounded-full absolute top-1 transition-all ${isDarkMode ? 'right-1' : 'left-1'}`} /></button>
                        </div>
                        <div className="p-4 bg-white/5 rounded-3xl border border-white/5 space-y-4">
                            <p>Wallpaper</p>
                            <button onClick={() => document.getElementById('wall-in').click()} className="w-full py-3 bg-white/10 rounded-2xl text-sm">Escolher Imagem...</button>
                            <input id="wall-in" type="file" className="hidden" onChange={e => { const f = e.target.files[0]; if(f) setWallpaper(URL.createObjectURL(f)); }} />
                        </div>
                    </div>
                </div>
            </div>
        );

        // --- Window System ---
        const Window = ({ windowData, onClose, onMinimize, onFocus, children }) => {
            const [pos, setPos] = useState({ x: windowData.x, y: windowData.y });
            const [isDragging, setIsDragging] = useState(false);
            const dragStart = useRef({ x: 0, y: 0 });

            useEffect(() => {
                const move = (e) => { 
                    if(isDragging) {
                        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                        setPos({ x: clientX - dragStart.current.x, y: clientY - dragStart.current.y }); 
                    }
                };
                const up = () => setIsDragging(false);
                if(isDragging) { 
                    document.addEventListener('mousemove', move); 
                    document.addEventListener('mouseup', up);
                    document.addEventListener('touchmove', move);
                    document.addEventListener('touchend', up);
                }
                return () => { 
                    document.removeEventListener('mousemove', move); 
                    document.removeEventListener('mouseup', up);
                    document.removeEventListener('touchmove', move);
                    document.removeEventListener('touchend', up);
                };
            }, [isDragging]);

            if (windowData.isMinimized) return null;

            return (
                <motion.div initial={{ opacity: 0, scale: 0.9, filter: 'blur(20px)' }} animate={{ opacity: 1, scale: 1, filter: 'blur(0px)' }} style={{ left: pos.x, top: pos.y, zIndex: windowData.zIndex }} className="absolute w-[500px] h-[600px] glass rounded-[40px] shadow-2xl flex flex-col overflow-hidden pointer-events-auto" onMouseDown={onFocus}>
                    <div className="h-14 bg-black/10 flex items-center justify-between px-6">
                        <div 
                            className="flex items-center gap-3 cursor-grab active:cursor-grabbing py-2 pr-10"
                            onMouseDown={e => { setIsDragging(true); dragStart.current = { x: e.clientX - pos.x, y: e.clientY - pos.y }; }}
                            onTouchStart={e => { setIsDragging(true); dragStart.current = { x: e.touches[0].clientX - pos.x, y: e.touches[0].clientY - pos.y }; }}
                        >
                            <div className="text-white/70 pointer-events-none"><Icon name={windowData.icon} size={16} /></div>
                            <span className="text-white text-sm font-medium select-none pointer-events-none">{windowData.title}</span>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={onMinimize} className="w-8 h-8 rounded-full hover:bg-white/10 flex items-center justify-center text-white/50"><Icon name="minus" size={14} /></button>
                            <button onClick={onClose} className="w-8 h-8 rounded-full hover:bg-red-500/50 flex items-center justify-center text-white/50 hover:text-white"><Icon name="x" size={14} /></button>
                        </div>
                    </div>
                    <div className="flex-grow overflow-hidden">{children}</div>
                </motion.div>
            );
        };

        // --- App Principal ---
        const App = () => {
            const [booting, setBooting] = useState(true);
            const [bootProgress, setBootProgress] = useState(0);
            const [isLocked, setIsLocked] = useState(false);
            const [isStartOpen, setIsStartOpen] = useState(false);
            const [isPanelOpen, setIsPanelOpen] = useState(false);
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [windows, setWindows] = useState([]);
            const [time, setTime] = useState(new Date());
            const [wallpaper, setWallpaper] = useState(null);
            const [contextMenu, setContextMenu] = useState(null);

            useEffect(() => {
                const boot = setInterval(() => setBootProgress(p => { 
                    if(p >= 100) { clearInterval(boot); setTimeout(() => { setBooting(false); setIsLocked(true); }, 500); return 100; } 
                    return p + 2; 
                }), 40);
                setInterval(() => setTime(new Date()), 1000);
            }, []);

            const openApp = (type, title, icon) => {
                const existing = windows.find(w => w.type === type);
                if (existing) {
                    setWindows(prev => prev.map(w => w.id === existing.id ? { ...w, isMinimized: false, zIndex: Math.max(...prev.map(x => x.zIndex)) + 1 } : w));
                } else {
                    setWindows([...windows, { id: Date.now(), type, title, icon, isMinimized: false, zIndex: windows.length + 10, x: 100 + windows.length * 30, y: 100 + windows.length * 30 }]);
                }
                setIsStartOpen(false);
            };

            if (booting) return (
                <div className="h-screen w-screen bg-[#020617] flex flex-col items-center justify-center gap-12">
                    <motion.div initial={{ opacity: 0, scale: 0.8 }} animate={{ opacity: 1, scale: 1 }} transition={{ duration: 1 }}><MintLogo size={120} /></motion.div>
                    <div className="w-48 h-1 bg-white/5 rounded-full overflow-hidden"><motion.div className="h-full bg-white" initial={{ width: 0 }} animate={{ width: `${bootProgress}%` }} /></div>
                </div>
            );

            return (
                <div className={`h-screen w-screen overflow-hidden relative ${isDarkMode ? 'dark-theme' : 'light-theme'}`} onContextMenu={e => { e.preventDefault(); setContextMenu({ x: e.clientX, y: e.clientY }); }} onClick={() => { setContextMenu(null); setIsPanelOpen(false); setIsStartOpen(false); }}>
                    
                    <div className="desktop-scale w-full h-full relative">
                        {/* Lock Screen */}
                        <AnimatePresence>
                            {isLocked && (
                                <motion.div exit={{ opacity: 0, y: -100, filter: 'blur(40px)' }} className="fixed inset-0 z-[200] bg-black/60 backdrop-blur-3xl flex flex-col items-center justify-between py-24 text-white">
                                    <div className="text-center">
                                        <h1 className="text-9xl font-[200] tracking-[-0.05em]">{time.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}</h1>
                                        <p className="text-xl font-light opacity-60 mt-4 tracking-widest uppercase">{time.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' })}</p>
                                    </div>
                                    <button onClick={() => setIsLocked(false)} className="px-12 py-5 bg-white/10 border border-white/20 rounded-full hover:bg-white/20 transition-all font-medium">Deslize para desbloquear</button>
                                </motion.div>
                            )}
                        </AnimatePresence>

                        {/* Wallpaper */}
                        <div className="absolute inset-0 z-0 bg-center bg-cover transition-all duration-1000" style={{ backgroundImage: wallpaper ? `url(${wallpaper})` : 'none' }}>
                            {!wallpaper && <div className="flex justify-center items-center h-full opacity-20"><div className="w-[150vh] h-[150vh] border border-white/10 rounded-full flex items-center justify-center"><div className="w-[100vh] h-[100vh] border border-white/20 rounded-full flex items-center justify-center"><div className="w-[50vh] h-[50vh] bg-indigo-500 rounded-full blur-[120px]"></div></div></div></div>}
                        </div>

                        {/* Ícones Desktop */}
                        <div className="absolute inset-0 z-10 p-12 flex flex-col flex-wrap gap-12 content-start pointer-events-none">
                            {[
                                { l: 'Arquivos', i: 'folder', c: 'text-amber-400', t: 'folder' },
                                { l: 'Galeria', i: 'image', c: 'text-purple-400', t: 'gallery' },
                                { l: 'Música', i: 'music', c: 'text-pink-400', t: 'music' },
                                { l: 'Calculadora', i: 'calculator', c: 'text-emerald-400', t: 'calculator' },
                                { l: 'Ajustes', i: 'settings', c: 'text-slate-400', t: 'settings' }
                            ].map(app => (
                                <div key={app.t} onClick={() => openApp(app.t, app.l, app.i)} className="w-24 flex flex-col items-center gap-3 cursor-pointer pointer-events-auto group">
                                    <div className="w-20 h-20 bg-white/10 rounded-[32px] flex items-center justify-center group-hover:scale-110 transition-transform shadow-xl"><Icon name={app.i} size={36} className={app.c} /></div>
                                    <span className="text-white text-[11px] font-medium drop-shadow-lg">{app.l}</span>
                                </div>
                            ))}
                        </div>

                        {/* Janelas */}
                        <div className="absolute inset-0 z-20 pointer-events-none">
                            <AnimatePresence>
                                {windows.map(win => (
                                    <Window key={win.id} windowData={win} onClose={() => setWindows(windows.filter(w => w.id !== win.id))} onMinimize={() => setWindows(windows.map(w => w.id === win.id ? {...w, isMinimized: true} : w))} onFocus={() => setWindows(windows.map(w => w.id === win.id ? {...w, zIndex: Math.max(...windows.map(x => x.zIndex)) + 1} : w))}>
                                        {win.type === 'calculator' && <CalculatorApp />}
                                        {win.type === 'music' && <MusicApp />}
                                        {win.type === 'gallery' && <GalleryApp />}
                                        {win.type === 'folder' && <FilesApp />}
                                        {win.type === 'settings' && <SettingsApp isDarkMode={isDarkMode} setIsDarkMode={setIsDarkMode} setWallpaper={setWallpaper} />}
                                    </Window>
                                ))}
                            </AnimatePresence>
                        </div>

                        {/* Taskbar Refinada */}
                        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-[800px] h-16 glass rounded-full flex items-center justify-between px-2 z-[150] shadow-2xl">
                            <div className="flex items-center gap-2">
                                <button onClick={e => { e.stopPropagation(); setIsStartOpen(!isStartOpen); }} className="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center hover:bg-white/20 transition-all"><MintLogo size={28} /></button>
                                <div className="h-8 w-px bg-white/10 mx-1"></div>
                                <div className="flex gap-1.5">
                                    {windows.map(win => <button key={win.id} onClick={() => setWindows(windows.map(w => w.id === win.id ? {...w, isMinimized: false, zIndex: Math.max(...windows.map(x => x.zIndex)) + 1} : w))} className={`w-11 h-11 rounded-2xl flex items-center justify-center transition-all ${!win.isMinimized ? 'bg-white/20 shadow-inner' : 'bg-white/5'}`}><Icon name={win.icon} size={18} className="text-white/80" /></button>)}
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <button onClick={e => { e.stopPropagation(); setIsPanelOpen(!isPanelOpen); }} className="flex items-center gap-4 bg-black/20 px-5 py-2.5 rounded-full text-white transition-all hover:bg-black/30">
                                    <div className="flex gap-2.5 opacity-50"><Icon name="wifi" size={14} /><Icon name="battery" size={14} className="rotate-90" /></div>
                                    <span className="text-xs font-bold">{time.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
