<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MintOS</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <style>
        /* =========================================
           RESET E FUNDO GERAL
           ========================================= */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #051d38; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; 
        }

        /* =========================================
           WALLPAPER (CÍRCULOS EM CSS E FUNDO CUSTOMIZADO)
           ========================================= */
        .wallpaper-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            position: fixed; 
            top: 0;
            left: 0;
            z-index: 1; 
            transition: background-image 0.5s ease-in-out;
            background-position: center center;
            /* MUDANÇA AQUI: Alterado para cover */
            background-size: cover;
            background-repeat: no-repeat;
        }

        #rings-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .ring {
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0; 
        }

        .outer-ring-4 { width: 250vh; height: 250vh; background-color: #0b2040; box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.7); }
        .outer-ring-3 { width: 180vh; height: 180vh; background-color: #0d3870; box-shadow: inset 0 0 45px rgba(0, 0, 0, 0.6); }
        .outer-ring-2 { width: 120vh; height: 120vh; background-color: #1255a0; box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.5); }
        .outer-ring-1 { width: 70vh; height: 70vh; background-color: #1e88e5; box-shadow: inset 0 0 35px rgba(0, 0, 0, 0.4); }

        .inner-circle {
            width: 30vh; height: 30vh;
            background-image: radial-gradient(circle at center, #7bb9f2 0%, #1e88e5 100%);
            border-radius: 50%;
            box-shadow: inset 0 0 25px rgba(0, 0, 0, 0.3);
        }

        /* =========================================
           BARRA DE TAREFAS (MINTOS)
           ========================================= */
        .taskbar {
            position: fixed;
            bottom: 20px; 
            left: 50%;
            transform: translateX(-50%); 
            width: 75%; 
            max-width: 800px; 
            height: 48px; 
            z-index: 10; 
            
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6px;
        }

        .taskbar-left {
            display: flex;
            align-items: center;
            gap: 12px; 
        }

        .start-btn {
            width: 36px; 
            height: 36px; 
            background: rgba(255, 255, 255, 0.2); 
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-left: 4px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .start-btn:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.35); 
        }

        .app-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%; 
            display: flex;
            justify-content: center;
            align-items: center;
            color: white; 
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }

        .app-icon:hover {
            background: rgba(255, 255, 255, 0.2); 
            transform: translateY(-2px); 
        }

        .app-icon .material-symbols-outlined {
            font-size: 20px;
        }

        .system-tray {
            background: rgba(0, 0, 0, 0.4);
            height: 36px; 
            border-radius: 18px; 
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 10px; 
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }

        .system-tray:hover {
            background: rgba(0, 0, 0, 0.6);
        }

        .system-tray .material-symbols-outlined {
            font-size: 16px; 
        }

        #clock {
            font-weight: 600;
            font-size: 12px; 
            letter-spacing: 0.4px;
        }
    </style>
</head>
<body>

    <div class="wallpaper-container" id="desktop-wallpaper">
        <div id="rings-container">
            <div class="ring outer-ring-4">
                <div class="ring outer-ring-3">
                    <div class="ring outer-ring-2">
                        <div class="ring outer-ring-1">
                            <div class="inner-circle"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="wallpaper-picker" accept="image/*" style="display: none;">

    <div class="taskbar">
        
        <div class="taskbar-left">
            <div class="start-btn" title="Menu MintOS">
                <svg width="20" height="20" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M 75 22 A 40 40 0 1 0 75 78" stroke="white" stroke-width="12" stroke-linecap="round"/>
                    <rect x="25" y="44" width="38" height="12" rx="6" fill="white"/>
                </svg>
            </div>

            <div class="app-icon" id="wallpaper-app" title="Mudar Fundo de Tela">
                <span class="material-symbols-outlined">wallpaper</span>
            </div>
        </div>

        <div class="system-tray" title="Painel de Controle">
            <span class="material-symbols-outlined">wifi</span>
            <span class="material-symbols-outlined">battery_5_bar</span>
            <span id="clock">00:00</span>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        const wallpaperApp = document.getElementById('wallpaper-app');
        const wallpaperPicker = document.getElementById('wallpaper-picker');
        const desktopWallpaper = document.getElementById('desktop-wallpaper');
        const ringsContainer = document.getElementById('rings-container');

        wallpaperApp.addEventListener('click', () => {
            wallpaperPicker.click();
        });

        wallpaperPicker.addEventListener('change', (event) => {
            const file = event.target.files[0]; 
            
            if (file) {
                const imageUrl = URL.createObjectURL(file);
                ringsContainer.style.display = 'none';
                desktopWallpaper.style.backgroundImage = `url('${imageUrl}')`;
            }
        });
    </script>

</body>
</html>
